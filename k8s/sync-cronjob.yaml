apiVersion: batch/v1
kind: CronJob
metadata:
  name: f1-sync-races
  namespace: user-mascret
spec:
  # Every Monday at 06:00 UTC (after race weekend)
  schedule: "0 6 * * 1"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: sync
              image: ghcr.io/nujabest/curly-octo-adventure:latest
              command: ["python", "scripts/sync_races.py", "--years", "2024", "2025", "2026"]
              env:
                - name: FF1_CACHE_DIR
                  value: /app/cache
                - name: S3_BUCKET
                  value: mascret
                - name: AWS_S3_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: s3-credentials
                      key: AWS_S3_ENDPOINT
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: s3-credentials
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: s3-credentials
                      key: AWS_SECRET_ACCESS_KEY
                - name: AWS_SESSION_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: s3-credentials
                      key: AWS_SESSION_TOKEN
                      optional: true
                - name: AWS_DEFAULT_REGION
                  valueFrom:
                    secretKeyRef:
                      name: s3-credentials
                      key: AWS_DEFAULT_REGION
                      optional: true
              resources:
                requests:
                  memory: "2Gi"
                  cpu: "500m"
                limits:
                  memory: "6Gi"
                  cpu: "1000m"
